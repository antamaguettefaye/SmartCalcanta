<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculatrice Scientifique</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    
</head>
<body data-theme="dark">
    <div class="app-container">
        <div class="overlay" id="overlay"></div>
        
        <!-- Bouton Menu Mobile -->
        <button class="menu-toggle" id="menu-toggle" aria-label="Ouvrir/Fermer le menu">
            <i class="fas fa-bars"></i>
            <i class="fas fa-times"></i>
        </button>

        <!-- Barre latérale -->
        <nav class="sidebar glass" id="sidebar">
            <div class="sidebar-header">
                <div class="brand-link">
                    <div class="logo">
<i class="fa-solid fa-calculator"></i>
                    </div>
                    <div class="sidebar-title">CalcPro</div>
                </div>
                <button class="theme-switcher" id="theme-switcher" aria-label="Changer de thème">
                   <i class="fa-regular fa-moon"></i>
<i class="fa-regular fa-sun"></i>

                </button>
            </div>
            
            <ul class="nav-list" id="nav-list">
                <li data-mode="basic">
                    <a href="#" title="Calculatrice Basique">
                        <i class="fas fa-calculator"></i> 
                        <span>Basique</span>
                    </a>
                </li>
                <li data-mode="scientific" class="active">
                    <a href="#" title="Calculatrice Scientifique">
                        <i class="fas fa-flask"></i> 
                        <span>Scientifique</span>
                    </a>
                </li>
            </ul>
            <footer class="footer">
    © 2025 Anta Maguette Faye. Tous droits réservés.
</footer>
        </nav>

        <!-- Corps principal -->
        <div class="app-body">
            <main class="main-content">
                <div class="calculator glass" id="calculator">
                    <!-- Sélecteur de mode -->
                    <div class="mode-switcher">
                        <button class="mode-btn" data-mode="basic">Basique</button>
                        <button class="mode-btn active" data-mode="scientific">Scientifique</button>
                    </div>

                    <!-- Écran d'affichage -->
                    <div class="display">
                        <span id="memory-indicator">M</span>
                        <span id="angle-unit-indicator">DEG</span>
                        <button id="history-toggle" aria-label="Afficher l'historique">
                            <i class="fas fa-history"></i>
                        </button>
                        <button id="copy-btn" aria-label="Copier le résultat">
                            <i class="fas fa-copy"></i>
                        </button>
                        <div class="display-history" id="display-history"></div>
                        <div class="display-main font-size-lg" id="display-main">0</div>
                    </div>

                    <!-- Boutons de contrôle -->
                    <div class="controls">
                        <button class="control-btn" id="undo-btn" disabled>
                            <i class="fas fa-undo"></i>
                        </button>
                        <button class="control-btn" id="redo-btn" disabled>
                            <i class="fas fa-redo"></i>
                        </button>
                        <button class="control-btn" data-action="memory-clear">MC</button>
                        <button class="control-btn" data-action="memory-recall">MR</button>
                        <button class="control-btn" data-action="memory-add">M+</button>
                        <button class="control-btn" data-action="memory-subtract">M−</button>
                    </div>

                    <!-- Claviers -->
                    <div class="keypads-container">
                        <!-- Clavier scientifique -->
                        <div class="keypad scientific-keypad">
                            <button class="keypad-btn" data-action="toggle-angle" id="angle-toggle-btn">DRG</button>
                            <button class="keypad-btn" data-action="toggle-fe" id="fe-toggle-btn">F-E</button>
                            <button class="keypad-btn" data-action="negate">±</button>
                            <button class="keypad-btn" data-action="operator" data-value=" mod ">mod</button>
                            <button class="keypad-btn" data-action="constant" data-value="Ans">Ans</button>

                            <button class="keypad-btn" data-action="toggle-2nd" id="second-fn-btn">2<sup>nd</sup></button>
                            <button class="keypad-btn" data-action="postfix-op" data-value="^(2)" data-second-action="sci-op" data-second-value="abs" data-second-text="|x|">x²</button>
                            <button class="keypad-btn" data-action="postfix-op" data-value="^(3)" data-second-action="sci-op" data-second-value="reciprocal" data-second-text="1/x">x³</button>
                            <button class="keypad-btn" data-action="operator" data-value="^" data-second-value="y-root" data-second-text="ʸ√x">xʸ</button>
                            <button class="keypad-btn" data-action="sci-op" data-value="exp" data-second-value="two-power" data-second-text="2ˣ">eˣ</button>

                            <button class="keypad-btn" data-action="sci-op" data-value="ten-power" data-second-value="log2" data-second-text="log₂(x)">10ˣ</button>
                            <button class="keypad-btn" data-action="paren" data-value="(">(</button>
                            <button class="keypad-btn" data-action="paren" data-value=")">)</button>
                            <button class="keypad-btn" data-action="sci-op" data-value="sqrt" data-second-value="cbrt" data-second-text="∛x">√x</button>
                            <button class="keypad-btn" data-action="postfix-op" data-value="!" data-second-action="sci-op" data-second-value="rand" data-second-text="rand">n!</button>

                            <button class="keypad-btn" data-action="sci-op" data-value="ln" data-second-value="log-y" data-second-text="log<sub>y</sub>(x)">ln</button>
                            <button class="keypad-btn" data-action="sci-op" data-value="log">log</button>
                            <button class="keypad-btn" data-action="sci-op" data-value="sin" data-second-value="asin" data-second-text="sin⁻¹">sin</button>
                            <button class="keypad-btn" data-action="sci-op" data-value="cos" data-second-value="acos" data-second-text="cos⁻¹">cos</button>
                            <button class="keypad-btn" data-action="sci-op" data-value="tan" data-second-value="atan" data-second-text="tan⁻¹">tan</button>

                            <button class="keypad-btn" data-action="constant" data-value="π">π</button>
                            <button class="keypad-btn" data-action="constant" data-value="e">e</button>
                            <button class="keypad-btn" data-action="sci-op" data-value="sinh" data-second-value="asinh" data-second-text="sinh⁻¹">sinh</button>
                            <button class="keypad-btn" data-action="sci-op" data-value="cosh" data-second-value="acosh" data-second-text="cosh⁻¹">cosh</button>
                            <button class="keypad-btn" data-action="sci-op" data-value="tanh" data-second-value="atanh" data-second-text="tanh⁻¹">tanh</button>
                        </div>

                        <!-- Clavier basique -->
                        <div class="keypad basic-keypad">
                            <button class="keypad-btn function" id="clear-btn" data-action="clear">AC</button>
                            <button class="keypad-btn function" data-action="negate">±</button>
                            <button class="keypad-btn function" data-action="percent">%</button>
                            <button class="keypad-btn function" data-action="backspace">
                                <i class="fas fa-delete-left"></i>
                            </button>

                            <button class="keypad-btn" data-action="number" data-value="7">7</button>
                            <button class="keypad-btn" data-action="number" data-value="8">8</button>
                            <button class="keypad-btn" data-action="number" data-value="9">9</button>
                            <button class="keypad-btn operator" data-action="operator" data-value="/">÷</button>

                            <button class="keypad-btn" data-action="number" data-value="4">4</button>
                            <button class="keypad-btn" data-action="number" data-value="5">5</button>
                            <button class="keypad-btn" data-action="number" data-value="6">6</button>
                            <button class="keypad-btn operator" data-action="operator" data-value="*">×</button>

                            <button class="keypad-btn" data-action="number" data-value="1">1</button>
                            <button class="keypad-btn" data-action="number" data-value="2">2</button>
                            <button class="keypad-btn" data-action="number" data-value="3">3</button>
                            <button class="keypad-btn operator" data-action="operator" data-value="-">−</button>

                            <button class="keypad-btn" data-action="number" data-value="0">0</button>
                            <button class="keypad-btn" data-action="decimal" data-value=".">.</button>
                            <button class="keypad-btn equals" data-action="calculate">=</button>
                            <button class="keypad-btn operator" data-action="operator" data-value="+">+</button>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <!-- Panneau d'historique -->
        <aside class="history-panel glass" id="history-panel">
            <div class="history-header">
                <h3 class="history-title">Historique</h3>
                <button class="close-history" id="close-history">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <ul class="history-list" id="history-list"></ul>
            <button class="clear-history" id="clear-history-btn">Effacer l'historique</button>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
